app:
  packages: 'all' # ✨

  routes:
    bindings:
      catalog.viewTechDoc: techdocs.docRoot
      org.catalogIndex: catalog.catalogIndex

  pluginOverrides:
    - match:
        pluginId: pages
      info:
        description: 'This description was overridden in packages/app/app-config.yaml'
    - match:
        pluginId: /^catalog(-.*)?$/
      info:
        ownerEntityRefs: [cubic-belugas]
    - match:
        packageName: '@backstage/plugin-scaffolder'
      info:
        ownerEntityRefs: [cubic-belugas]

  extensions:
    # set availableLanguages example
    - api:app/app-language:
        config:
          availableLanguages: ['en', 'es', 'fr', 'de', 'ja']
          defaultLanguage: 'en'
    - entity-card:org/members-list:
        config:
          showAggregateMembersToggle: true
          initialRelationAggregation: aggregated
    - entity-card:org/ownership:
        config:
          ownedKinds: ['Component', 'API', 'System']

    # - apis.plugin.graphiql.browse.gitlab: true
    # - graphiql-endpoint:graphiql/gitlab: true

    - nav-item:search: false
    - nav-item:user-settings: false
    - nav-item:catalog
    - nav-item:api-docs
    - nav-item:scaffolder
    - nav-item:app-visualizer

    # Pages
    - page:catalog/entity:
        config:
          showNavItemIcons: true
          groups:
            - overview:
                title: Overview
            - testing:
                title: API Testing
            - documentation:
                title: Docs
                icon: docs

    # Entity page cards
    # Overview: About + Health + Provided APIs
    - entity-card:catalog/about
    - entity-card:catalog/labels: false
    - entity-card:catalog/links: false
    - entity-card:catalog/depends-on-components: false
    - entity-card:catalog/depends-on-resources: false
    - entity-card:catalog/has-components: false
    - entity-card:catalog/has-resources: false
    - entity-card:catalog/has-subcomponents: false
    - entity-card:catalog/has-subdomains: false
    - entity-card:catalog/has-systems: false
    - entity-card:catalog-graph/relations: false
    # API docs — disable defaults, use custom summary cards on overview
    - entity-card:api-docs/has-apis: false
    - entity-card:api-docs/definition: false
    - entity-card:api-docs/consumed-apis: false
    - entity-card:api-docs/provided-apis: false
    - entity-card:api-docs/providing-components: false
    - entity-card:api-docs/consuming-components: false
    # Org cards
    - entity-card:org/group-profile: false
    - entity-card:org/members-list: false
    - entity-card:org/ownership: false
    - entity-card:org/user-profile: false

    # Entity page contents (tabs)
    - entity-content:catalog/overview:
        config:
          group: overview
    - entity-content:api-docs/definition: false
    - entity-content:api-docs/apis: false
    - entity-content:app/api-route-definition:
        config:
          group: testing
    - entity-content:techdocs:
        config:
          group: documentation
          icon: techdocs
    - entity-content:kubernetes/kubernetes: false

    # Enable the catalog-unprocessed-entities tab in devtools
    - devtools-content:catalog-unprocessed-entities: true
    # Disable the catalog-unprocessed-entities element outside devtools
    - page:catalog-unprocessed-entities: false

