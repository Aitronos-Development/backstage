# Docker overlay — adds Redis cache and OpenSearch on top of base config.
# PostgreSQL is already configured in app-config.yaml.
#
# Usage:
# 1. `docker compose -f docker-compose.deps.yml up --wait`
# 2. `BACKSTAGE_ENV=docker yarn dev`
backend:
  cache:
    store: redis
    connection: redis://localhost:6381

search:
  elasticsearch:
    provider: opensearch
    node: 'http://localhost:9200'
    auth:
      username: admin
      password: admin
